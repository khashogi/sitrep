<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SITREP-2026-03-07 | Day 8 — US-Iran Conflict Intelligence Brief</title>
  <meta name="description" content="Daily intelligence briefing on the US-Iran conflict. Day 8 of Conflict of Operation Epic Fury / Roaring Lion / True Promise IV.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --font-sans: 'IBM Plex Sans', -apple-system, sans-serif;
      --font-mono: 'IBM Plex Mono', 'Courier New', monospace;
      --bg: #f8f7f4;
      --bg-secondary: #f0ede8;
      --border: #ddd9d0;
      --text: #1a1916;
      --text-secondary: #4a4741;
      --text-muted: #7a746e;
      --accent: #c0392b;
      --red: #c0392b;
      --orange: #d35400;
      --yellow: #b7860b;
      --green: #1a6b3c;
      --radius: 6px;
    }
    [data-theme="dark"] {
      --bg: #141210;
      --bg-secondary: #1e1b18;
      --border: #2e2a24;
      --text: #e8e4de;
      --text-secondary: #b8b0a4;
      --text-muted: #7a746e;
      --accent: #e05a4a;
      --red: #e05a4a;
      --orange: #e8783a;
      --yellow: #d4a017;
      --green: #2ecc71;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      padding-bottom: 80px;
    }

    /* ── Topbar ── */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 24px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(8px);
    }
    .topbar-label {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    .topbar-label span { color: var(--red); margin-right: 6px; }

    /* ── Theme Toggle ── */
    .theme-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      user-select: none;
    }
    .theme-toggle-label {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
    }
    .toggle-track {
      width: 42px;
      height: 22px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 11px;
      position: relative;
      transition: background 0.2s;
    }
    .toggle-knob {
      position: absolute;
      top: 2px;
      left: 2px;
      width: 16px;
      height: 16px;
      background: var(--text-secondary);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s;
    }
    [data-theme="dark"] .toggle-knob { transform: translateX(20px); }
    .toggle-icon { font-size: 9px; position: absolute; }
    .toggle-icon-moon { opacity: 0; }
    [data-theme="dark"] .toggle-icon-sun { opacity: 0; }
    [data-theme="dark"] .toggle-icon-moon { opacity: 1; }

    /* ── Article Layout ── */
    .article {
      max-width: 760px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    /* ── Typography ── */
    .article h1 {
      font-family: var(--font-mono);
      font-size: 1.35rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--text);
      margin-bottom: 4px;
      line-height: 1.3;
    }
    .article h2 {
      font-family: var(--font-mono);
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      margin: 48px 0 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }
    .article h3 {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      margin: 28px 0 10px;
    }
    .article p {
      margin-bottom: 16px;
      color: var(--text-secondary);
    }
    .article strong { color: var(--text); font-weight: 600; }
    .article em { font-style: italic; }
    .article hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 32px 0;
    }
    .article ul, .article ol {
      padding-left: 24px;
      margin-bottom: 16px;
      color: var(--text-secondary);
    }
    .article li { margin-bottom: 6px; }
    .article a { color: var(--accent); text-decoration: none; }
    .article a:hover { text-decoration: underline; }

    /* ── Tables ── */
    .table-wrap { overflow-x: auto; margin: 20px 0; }
    .article table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.88rem;
    }
    .article th {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      text-align: left;
      padding: 8px 12px;
      border-bottom: 2px solid var(--border);
    }
    .article td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
      color: var(--text-secondary);
    }
    .article tr:last-child td { border-bottom: none; }
    .article tr:hover td { background: var(--bg-secondary); }
    @media (max-width: 600px) {
      .article { padding: 24px 16px 60px; }
      .article h1 { font-size: 1.1rem; }
      .topbar { padding: 8px 16px; }
    }
</style>
  
<style>
    /* ── Archive Nav ── */
    .topbar-nav {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .topbar-nav a {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.2s ease;
      word-break: normal;
    }
    .topbar-nav a:hover {
      color: var(--accent);
      text-decoration: none;
    }
    .topbar-nav a::before {
      content: '←';
      margin-right: 4px;
    }
    .topbar-nav a.nav-forward::before {
      content: '→';
      margin-right: 0;
      margin-left: 4px;
      order: 1;
    }
    .topbar-nav a.nav-forward {
      display: flex;
      align-items: center;
    }
    
    /* ── Source Manifest (smaller, footer-like) ── */
    .sources-manifest {
      margin-top: 40px;
    }
    .sources-manifest h2 {
      font-size: 1.1rem;
    }
    .sources-manifest h3 {
      font-size: 0.85rem;
      margin-top: 20px;
      margin-bottom: 6px;
      color: var(--text-secondary);
    }
    .sources-manifest ul {
      list-style: none;
      padding-left: 0;
    }
    .sources-manifest li {
      font-size: 0.78rem;
      padding: 3px 0;
      line-height: 1.55;
      color: var(--text-muted);
    }
    .sources-manifest li strong {
      color: var(--text-secondary);
    }
    .sources-manifest p {
      font-size: 0.78rem;
      color: var(--text-muted);
    }
    
    /* ── Status Legend ── */
    .status-legend {
      font-size: 0.82rem;
      color: var(--text-secondary);
      margin-bottom: 16px;
      line-height: 1.7;
    }
    
    /* ── Updated status colors ── */
    .status-combat { color: var(--red); font-weight: 600; }
    .status-under-attack { color: var(--orange); font-weight: 600; }
    .status-tense { color: var(--yellow); font-weight: 600; }
    .status-stable { color: var(--green); font-weight: 600; }
    .status-critical { color: var(--red); font-weight: 700; text-transform: uppercase; font-size: 0.8rem; }
    .status-new { color: var(--red); font-weight: 700; }

    /* ── Scenario Blocks ── */
    .scenario {
      background: var(--bg-secondary);
      border-left: 3px solid var(--border);
      padding: 16px 20px;
      margin: 16px 0;
      border-radius: 0 var(--radius) var(--radius) 0;
    }
    .scenario-a { border-left-color: var(--red); }
    .scenario-b { border-left-color: var(--yellow); }
    .scenario-c { border-left-color: var(--orange); }
    .scenario p { margin-bottom: 0; }
    .scenario strong:first-child {
      display: block;
      margin-bottom: 6px;
      font-size: 0.95rem;
    }
</style>

</head>
<body>

<header class="topbar">
  <div class="topbar-nav">
    <a href="2026-03-06.html">Mar 06</a> <a href="index.html" class="nav-forward">Latest →</a>
    <div class="topbar-label"><span>●</span> SITREP — Day 8 of Conflict</div>
  </div>
  <div class="theme-toggle" onclick="toggleTheme()" role="button" tabindex="0" aria-label="Toggle dark mode">
    <span class="theme-toggle-label">Theme</span>
    <div class="toggle-track">
      <div class="toggle-knob">
        <span class="toggle-icon toggle-icon-sun">☀</span>
        <span class="toggle-icon toggle-icon-moon">☽</span>
      </div>
    </div>
  </div>
</header>

<article class="article">
<h1>SITREP-2026-03-07 | DAY 8 OF CONFLICT</h1>
<p><em>Archive — see latest report for current intelligence.</em></p>
</article>


<script>
  function toggleTheme() {
    const html = document.documentElement;
    const current = html.getAttribute('data-theme');
    const next = current === 'light' ? 'dark' : 'light';
    html.setAttribute('data-theme', next);
    localStorage.setItem('sitrep-theme', next);
  }
  (function() {
    const saved = localStorage.getItem('sitrep-theme');
    if (saved) document.documentElement.setAttribute('data-theme', saved);
  })();
  document.querySelector('.theme-toggle').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggleTheme(); }
  });

  // Auto-wrap Scenario A/B/C paragraphs into styled blocks
  (function() {
    const article = document.querySelector('.article');
    if (!article) return;
    const allP = article.querySelectorAll('p');
    allP.forEach(function(p) {
      const text = p.textContent || '';
      let cls = '';
      if (text.match(/^Scenario A[:\s]/i)) cls = 'scenario scenario-a';
      else if (text.match(/^Scenario B[:\s]/i)) cls = 'scenario scenario-b';
      else if (text.match(/^Scenario C[:\s]/i)) cls = 'scenario scenario-c';
      if (cls) {
        const wrapper = document.createElement('div');
        wrapper.className = cls;
        p.parentNode.insertBefore(wrapper, p);
        wrapper.appendChild(p);
      }
    });
  })();
</script>

</body>
</html>
